<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | ISTE Telangana</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #003366; --secondary: #FF6B35; --bg-white: #FFFFFF; --bg-light: #F5F7FA; --text-primary: #1A1A2E; --text-secondary: #666666; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Source Sans Pro', sans-serif; background: var(--bg-light); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { width: 100%; max-width: 420px; padding: 20px; }
        .login-box { background: var(--bg-white); border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .login-header { background: linear-gradient(135deg, var(--primary) 0%, #001a33 100%); padding: 40px 30px; text-align: center; color: white; }
        .login-header h1 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 8px; }
        .login-header p { font-size: 14px; opacity: 0.9; }
        .login-body { padding: 40px 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; font-size: 14px; color: var(--text-primary); margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; transition: all 0.3s; font-family: inherit; }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .btn { width: 100%; padding: 14px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn:hover { background: #e55a2b; transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .error-message { background: #fee; color: #c00; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; display: none; }
        .error-message.show { display: block; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: var(--primary); font-size: 14px; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>ISTE Telangana</h1>
                <p>Admin Control Panel</p>
            </div>
            <div class="login-body">
                <div class="error-message" id="errorMessage"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="Enter admin email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn" id="submitBtn">Sign In</button>
                </form>
                <div class="back-link">
                    <a href="../index.html">← Back to Website</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '../api';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            errorMessage.classList.remove('show');
            
            try {
                const response = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.admin));
                    window.location.href = 'index.html';
                } else {
                    errorMessage.textContent = data.message || 'Login failed';
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                errorMessage.textContent = 'Connection error. Please try again.';
                errorMessage.classList.add('show');
            }
            
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign In';
        });
    </script>
</body>
</html>
