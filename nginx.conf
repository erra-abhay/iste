worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Upstream — Node.js backend
    upstream backend {
        server backend:5000;
    }

    # ============================================
    # PORT 3000 — PUBLIC FRONTEND (users)
    # Serves: homepage, events, about, etc.
    # Blocks: /admin/* paths
    # ============================================
    server {
        listen 3000;
        server_name localhost;

        # Block admin pages on public port
        location /admin {
            return 403;
        }

        # API requests → backend
        location /api {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Uploaded files → backend
        location /uploads {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Everything else → backend (serves static frontend files)
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ============================================
    # PORT 3001 — ADMIN PORTAL (administrators)
    # Serves: admin login, dashboard, all admin pages
    # ============================================
    server {
        listen 3001;
        server_name localhost;

        # Redirect root to admin login
        location = / {
            return 302 /admin/login.html;
        }

        # API requests → backend
        location /api {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Uploaded files → backend
        location /uploads {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Admin pages → backend
        location /admin {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Block public frontend pages on admin port
        location / {
            return 302 /admin/login.html;
        }
    }
}
