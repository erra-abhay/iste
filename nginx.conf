worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Hide nginx version from response headers
    server_tokens off;

    # Rate limiting zone for API requests
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Upstream — Node.js backend
    upstream backend {
        server backend:5000;
    }

    # ============================================
    # PORT 3000 — PUBLIC FRONTEND (users)
    # Serves: homepage, events, about, etc.
    # Blocks: /admin/* paths
    # ============================================
    server {
        listen 3000;
        server_name localhost;
        absolute_redirect off;

        # --- Security Headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Block admin pages on public port
        location /admin {
            return 403;
        }

        # Block hidden files (.env, .git, etc.)
        location ~ /\. {
            deny all;
            return 404;
        }

        # API requests → backend (with rate limiting)
        location /api {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Uploaded files → backend
        location /uploads {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Everything else → backend (serves static frontend files)
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ============================================
    # PORT 3001 — ADMIN PORTAL (administrators)
    # Serves: admin login, dashboard, all admin pages
    # ============================================
    server {
        listen 3001;
        server_name localhost;
        absolute_redirect off;

        # --- Security Headers ---
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Redirect root to admin login
        location = / {
            return 302 /admin/login.html;
        }

        # Block hidden files (.env, .git, etc.)
        location ~ /\. {
            deny all;
            return 404;
        }

        # API requests → backend (with rate limiting)
        location /api {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Uploaded files → backend
        location /uploads {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Admin pages → backend
        location /admin {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Block public frontend pages on admin port
        location / {
            return 302 /admin/login.html;
        }
    }
}
