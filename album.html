<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album | ISTE Telangana</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #003366; --secondary: #FF6B35; --bg-white: #FFFFFF; --bg-light: #F5F7FA; --text-primary: #1A1A2E; --text-secondary: #666666; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Source Sans Pro', sans-serif; color: var(--text-primary); background: var(--bg-light); }
        h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 700; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        a { text-decoration: none; }

        .main-nav { background: var(--bg-white); box-shadow: 0 2px 20px rgba(0,0,0,0.1); position: sticky; width: 100%; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 18px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo-icon { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--primary); }
        .logo-text span { color: var(--secondary); }
        .nav-menu { display: flex; list-style: none; gap: 30px; }
        .nav-menu a { color: var(--text-primary); font-weight: 600; font-size: 16px; }
        .nav-menu a:hover { color: var(--secondary); }
        .mobile-toggle { display: none; }

        .page-hero {
            margin-top: 0;
            background: linear-gradient(135deg, var(--primary), #004080);
            padding: 60px 0;
            text-align: center;
            color: white;
        }
        .page-hero h1 { font-size: 42px; margin-bottom: 10px; }
        .page-hero p { color: rgba(255,255,255,0.8); }

        .content { padding: 50px 0; }
        .section-header { text-align: center; margin-bottom: 40px; }
        .section-header h2 { font-size: 32px; color: var(--primary); }

        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .gallery-item { aspect-ratio: 1; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.3s; }
        .gallery-item:hover { transform: scale(1.05); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        .back-link { display: inline-block; margin-bottom: 30px; color: var(--primary); font-weight: 600; }

        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img class="logo-icon" src="/images/istelogo.jpg" alt="ISTE Logo">
                <div class="logo-text">ISTE <span>Telangana</span></div>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="awards.html">Awards</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="notifications.html">Notifications</a></li>
                <li><a href="committee.html">Committee</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="page-hero">
        <div class="container">
            <h1 id="albumTitle">Loading...</h1>
            <p id="albumDescription"></p>
        </div>
    </section>

    <div class="content">
        <div class="container">
            <a href="gallery.html" class="back-link">← Back to Gallery</a>
            <div class="gallery-grid" id="galleryGrid">
                <p style="grid-column:1/-1;text-align:center;">Loading images...</p>
            </div>
        </div>
    </div>

    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var albumId = urlParams.get('id');

        async function loadAlbum() {
            try {
                var response = await fetch('/api/gallery/' + albumId);
                var album = await response.json();
                
                if (!album || album.error) {
                    document.getElementById('albumTitle').textContent = 'Album Not Found';
                    return;
                }

                document.getElementById('albumTitle').textContent = album.albumTitle;
                document.getElementById('albumDescription').textContent = album.description || '';
                document.title = album.albumTitle + ' | ISTE Telangana';

                var grid = document.getElementById('galleryGrid');
                var images = album.images || [];
                
                if (images.length > 0) {
                    var html = '';
                    for (var i = 0; i < images.length; i++) {
                        html += '<div class="gallery-item"><img src="' + images[i] + '" alt="Gallery Image"></div>';
                    }
                    grid.innerHTML = html;
                } else {
                    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;">No images in this album.</p>';
                }
            } catch(e) {
                document.getElementById('galleryGrid').innerHTML = '<p style="grid-column:1/-1;text-align:center;">Error loading album.</p>';
            }
        }

        loadAlbum();
    </script>
</body>
</html>
